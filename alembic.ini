# Alembic Configuration — AStock Market Engine
# 支持 SQLite (开发) / PostgreSQL (生产)

[alembic]
script_location = backend/database/migrations
prepend_sys_path = .
sqlalchemy.url = sqlite:///./data/market_memory.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
