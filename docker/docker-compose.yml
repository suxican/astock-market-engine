# AStock 市场认知引擎 — 开发环境 (热重载)
services:
  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8005:8005"
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - PORT=8005
    volumes:
      - ../backend:/app/backend
      - ../emotion_cycle_engine:/app/emotion_cycle_engine
      - ../market_reasoning_engine:/app/market_reasoning_engine
      - ../review_engine:/app/review_engine
      - ../dragon_leader_engine:/app/dragon_leader_engine
      - ../sector_rotation_engine:/app/sector_rotation_engine
      - ../limit_up_analysis:/app/limit_up_analysis
      - ../limit_down_analysis:/app/limit_down_analysis
      - ../data_sources:/app/data_sources
      - ../rag:/app/rag
      - ../vector_db:/app/vector_db
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8005 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8005
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev
